name: Build Armbian for Radxa Cubie A7A

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_build:
        description: "Force build even if upstream commit unchanged"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

env:
  UPSTREAM_REPO: https://github.com/NickAlilovic/build.git
  UPSTREAM_BRANCH: Radxa-A7A

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Get upstream latest commit
        id: upstream
        run: |
          COMMIT=$(git ls-remote "$UPSTREAM_REPO" "refs/heads/$UPSTREAM_BRANCH" | awk '{print $1}')
          if [ -z "$COMMIT" ]; then
            echo "::error::Failed to fetch upstream commit"
            exit 1
          fi
          SHORT_COMMIT=${COMMIT:0:8}
          echo "commit=$COMMIT" >> "$GITHUB_OUTPUT"
          echo "short_commit=$SHORT_COMMIT" >> "$GITHUB_OUTPUT"
          echo "Upstream latest commit: $COMMIT ($SHORT_COMMIT)"

      - name: Check if build is needed
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FORCE="${{ github.event.inputs.force_build }}"
          EVENT="${{ github.event_name }}"
          if [ "$FORCE" = "true" ] || [ "$EVENT" = "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Force build requested (event=$EVENT), skipping dedup check"
            exit 0
          fi

          LATEST_TAG=$(gh release view --repo "${{ github.repository }}" --json tagName -q '.tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No previous release found, proceeding with build"
            exit 0
          fi

          UPSTREAM_SHORT="${{ steps.upstream.outputs.short_commit }}"
          if echo "$LATEST_TAG" | grep -q "$UPSTREAM_SHORT"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Upstream commit $UPSTREAM_SHORT already built in release $LATEST_TAG, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New upstream commit detected, proceeding with build"
          fi

      - name: Free up disk space
        if: steps.check.outputs.skip != 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Checkout this repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          path: self

      - name: Set up QEMU for cross-compilation
        if: steps.check.outputs.skip != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Clone upstream build system
        if: steps.check.outputs.skip != 'true'
        run: |
          git clone --depth=1 -b "$UPSTREAM_BRANCH" "$UPSTREAM_REPO" build

      - name: Copy userpatches to build directory
        if: steps.check.outputs.skip != 'true'
        run: |
          cp -rv self/userpatches/ build/userpatches/

      - name: Compile Armbian image
        if: steps.check.outputs.skip != 'true'
        run: |
          cd build
          ./compile.sh build \
            BOARD=radxa-cubie-a7a \
            BRANCH=vendor \
            BUILD_DESKTOP=no \
            BUILD_MINIMAL=no \
            RELEASE=trixie \
            KERNEL_CONFIGURE=no

      - name: Locate build output and extract version
        if: steps.check.outputs.skip != 'true'
        id: artifact
        run: |
          IMG=$(find build/output/images/ \( -name '*.img.xz' -o -name '*.img.gz' -o -name '*.img' \) | head -n 1)
          if [ -z "$IMG" ]; then
            echo "::error::No image file found in build output"
            exit 1
          fi
          BASENAME=$(basename "$IMG")
          echo "image_path=$IMG" >> "$GITHUB_OUTPUT"
          echo "image_name=$BASENAME" >> "$GITHUB_OUTPUT"

          VERSION=$(echo "$BASENAME" | grep -oP 'Armbian[_-]\K[0-9]+\.[0-9]+(\.[0-9]+)?' || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected Armbian version: $VERSION"
          echo "Image: $IMG"

          sha256sum "$IMG" > "${IMG}.sha256"
          echo "sha_path=${IMG}.sha256" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.artifact.outputs.version }}"
          SHORT_COMMIT="${{ steps.upstream.outputs.short_commit }}"
          FULL_COMMIT="${{ steps.upstream.outputs.commit }}"
          TAG="Armbian_${VERSION}_${SHORT_COMMIT}"

          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          git push origin :"refs/tags/$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes "$(cat <<EOF
          ## Armbian for Radxa Cubie A7A

          - **Armbian Version**: ${VERSION}
          - **Upstream Commit**: [\`${SHORT_COMMIT}\`](https://github.com/NickAlilovic/build/commit/${FULL_COMMIT})
          - **Board**: radxa-cubie-a7a
          - **Release**: trixie (Debian 13)
          - **Kernel Branch**: vendor
          - **Desktop**: no
          - **Minimal**: no

          ### Customizations
          - Kernel: CONFIG_IPV6_MULTIPLE_TABLES, CONFIG_IP_MULTIPLE_TABLES, CONFIG_IP_ADVANCED_ROUTER enabled
          - Mirror: USTC mirrors pre-configured for Debian and Armbian repositories
          EOF
          )" \
            "${{ steps.artifact.outputs.image_path }}" \
            "${{ steps.artifact.outputs.sha_path }}"

          echo "Release created: $TAG"
